<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>School Registration</title>
        <style>
            body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
            .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
            h2 { text-align: center; color: #333; }
            label { display: block; margin: 10px 0 5px; }
            input[type="text"], input[type="email"] { width: 90%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
            button { width: 100%; padding: 10px; border: none; background-color: #5cb85c; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; }
            button:hover { background-color: #4cae4c; }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Register Your School</h2>
            <form action="/register" method="POST">
                <label for="name">School Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">School Email</label>
                <input type="email" id="email" name="email" required>

                <label for="address">Address</label>
                <input type="text" id="address" name="address">

                <button type="submit">Register</button>
            </form>
        </div>
    </body>
</html>
