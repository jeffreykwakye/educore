<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>School Registration</title>
        <style>
            body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
            .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
            h2 { text-align: center; color: #333; }
            label { display: block; margin: 10px 0 5px; }
            input[type="text"], input[type="tel"] { width: 90%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
            button { width: 100%; padding: 10px; border: none; background-color: #5cb85c; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; }
            button:hover { background-color: #4cae4c; }
            #message { text-align: center; margin-top: 15px; font-weight: bold; }
            .success { color: green; }
            .error { color: red; }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Register Your School</h2>
            <div id="registration-form">
                <label for="name">School Name</label>
                <input type="text" id="name" name="name" required>

                <label for="phone_number">Phone Number</label>
                <input type="tel" id="phone_number" name="phone_number" required>

                <label for="address">Address</label>
                <input type="text" id="address" name="address">

                <button type="submit" id="registerButton">Register</button>
            </div>
            <div id="message"></div>
        </div>

        <script src="/js/school/register.js"></script>
    </body>
</html>
